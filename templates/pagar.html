{% extends 'base.html' %}
{% block content %}

<h2>Pagar</h2>

<div class="mb-3">
    <a href="/carrito" class="btn btn-dark">Regresar al carrito</a>
</div>

<p>Total a pagar: ${{ "%.2f"|format(total) }}</p>
<form method="POST">
    <div class="mb-3">
        <label for="monto">Monto entregado:</label>
        <input type="number" step="0.01" name="monto" id="monto" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">Confirmar pago</button>
</form>

{% endblock %}
