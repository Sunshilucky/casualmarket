{% extends 'base.html' %}
{% block content %}

<h2 class="mb-4">Gestion de usuarios</h2>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        {% for u in usuarios %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.nombre }}</td>
            <td>{{ u.correo }}</td>
            <td>{{ u.rol }}</td>
            <td>
                <a href="/admin_usuarios_editar/{{ u.id }}" class="btn btn-warning btn-sm">Editar</a>

                {% if u.id != 1 %}
                <a href="/admin_usuarios_eliminar/{{ u.id }}" class="btn btn-danger btn-sm">Eliminar</a>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
