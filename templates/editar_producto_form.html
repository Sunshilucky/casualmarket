{% extends 'base.html' %}
{% block content %}

<h2 class="mb-4">Editar producto</h2>

<form action="/guardar_edicion/{{ producto.id }}" method="POST">

    <label>Título:</label>
    <input type="text" name="titulo" class="form-control" value="{{ producto.titulo }}" required>

    <label>Precio:</label>
    <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio }}" required>

    <label>Categoría ID:</label>
    <input type="number" name="categoria" class="form-control" value="{{ producto.categoria_id }}" required>

    <label>Imagen (nombre del archivo):</label>
    <input type="text" name="imagen" class="form-control" value="{{ producto.imagen }}" required>

    <button class="btn btn-primary mt-3" type="submit">Guardar cambios</button>

</form>

{% endblock %}
